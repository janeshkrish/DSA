name: Auto Update README

on:
  push:
    paths:
      - "java/**"

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Generate Java README
        run: node generate-readme.js

      - name: Generate Main README
        run: node generate-mainreadme.js

      - name: Commit Changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Auto update DSA progress" || echo "No changes"
          git push